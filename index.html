<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Checklist traitement yeux</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#f8fafc;color:#0f172a}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:16px}
.item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid #e2e8f0;border-radius:16px;margin:10px 0}
.badge{display:inline-block;background:#e2e8f0;border-radius:999px;padding:4px 10px;font-size:12px}
.small{color:#475569;font-size:14px}.due{outline:2px solid #94a3b8}.btn{border:0;border-radius:14px;padding:12px 14px;background:#0f172a;color:#fff;font-weight:600}.btn2{background:#fff;color:#0f172a;border:1px solid #cbd5e1}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}.switch{display:flex;gap:10px;align-items:center}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1 style="margin:0 0 8px">Checklist traitement yeux</h1>
<div class="small" id="now"></div>
<div class="small" id="plan"></div>
<div style="margin-top:12px" id="current"></div>
<div class="row" style="margin-top:14px">
<button class="btn" id="notif">Activer les alarmes Android</button>
<label class="switch"><input type="checkbox" id="azyter"> Cure Azyter active</label>
<button class="btn btn2" id="reset">Réinitialiser le jour</button>
</div>
</div>
<div id="sections"></div>
</div>
<script>
const weekday=[['09:00','Vismed','Œil droit','Larmes'],['09:05','Chaleur + massage + rinçage','Œil droit','Paupières'],['09:15','Dacryoserum','2 yeux','Nettoyage'],['09:20','Azyter','Œil droit · uniquement pendant les cures','Traitement'],['09:25','Dexafree','2 yeux','Traitement'],['09:35','Sterdex','Œil droit','Traitement'],['09:45','Vismed','Œil droit','Larmes'],['11:30','Vismed','Œil droit','Larmes'],['13:00','Dacryoserum','2 yeux','Nettoyage'],['13:05','Vismed','Œil droit','Larmes'],['15:30','Vismed','Œil droit','Larmes'],['17:30','Vismed','Œil droit','Larmes'],['18:30','Vismed','Œil droit','Larmes'],['21:30','Chaleur + massage + rinçage','Œil droit','Paupières'],['21:45','Dacryoserum','2 yeux','Nettoyage'],['21:50','Dexafree','2 yeux','Traitement'],['22:00','Sterdex','Œil droit','Traitement'],['22:10','Vismed','Œil droit','Larmes'],['23:10','Hydramed Night','Œil droit ± gauche','Nuit']];
const weekend=[['10:00','Vismed','Œil droit','Larmes'],['10:05','Chaleur + massage + rinçage','Œil droit','Paupières'],['10:15','Dacryoserum','2 yeux','Nettoyage'],['10:20','Azyter','Œil droit · uniquement pendant les cures','Traitement'],['10:25','Dexafree','2 yeux','Traitement'],['10:35','Sterdex','Œil droit','Traitement'],['10:45','Vismed','Œil droit','Larmes'],['12:30','Vismed','Œil droit','Larmes'],['14:00','Dacryoserum','2 yeux','Nettoyage'],['14:05','Vismed','Œil droit','Larmes'],['16:30','Vismed','Œil droit','Larmes'],['18:30','Vismed','Œil droit','Larmes'],['19:30','Vismed','Œil droit','Larmes'],['21:30','Chaleur + massage + rinçage','Œil droit','Paupières'],['21:45','Dacryoserum','2 yeux','Nettoyage'],['21:50','Dexafree','2 yeux','Traitement'],['22:00','Sterdex','Œil droit','Traitement'],['22:10','Vismed','Œil droit','Larmes'],['23:10','Hydramed Night','Œil droit ± gauche','Nuit']];
const k=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const mins=t=>{let[a,b]=t.split(':').map(Number);return a*60+b};
let settings=JSON.parse(localStorage.getItem('eye-settings')||'{"azyter":false}');
document.getElementById('azyter').checked=settings.azyter;
let last='';
function sched(now=new Date()){
  const base=([0,6].includes(now.getDay())?weekend:weekday).map((x,i)=>({id:`${x[0]}-${i}`,time:x[0],label:x[1],detail:x[2],cat:x[3]}));
  return base.filter(x=>settings.azyter||x.label!=='Azyter');
}
function checks(){return JSON.parse(localStorage.getItem('eye-checks')||'{}')}
function setChecks(v){localStorage.setItem('eye-checks',JSON.stringify(v))}
function render(){
  const now=new Date();
  const schedule=sched(now); const cks=checks(); const today=cks[k(now)]||{};
  document.getElementById('now').textContent='Heure actuelle : '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('plan').textContent='Planning actif : '+(([0,6].includes(now.getDay()))?'week-end':'semaine');
  const nowMin=now.getHours()*60+now.getMinutes();
  const due=schedule.filter(x=>nowMin-mins(x.time)>=0 && nowMin-mins(x.time)<=4 && !today[x.id]);
  const next=schedule.find(x=>mins(x.time)>=nowMin);
  document.getElementById('current').innerHTML=due.length?`<div><b>À faire maintenant</b><div style="margin-top:8px">${due.map(x=>`<div class="item due"><div></div><div><b>${x.time} · ${x.label}</b><div class="small">${x.detail}</div></div><div></div></div>`).join('')}</div></div>`:(next?`<b>Prochain rappel</b><div style="margin-top:8px">${next.time} · ${next.label}<div class="small">${next.detail}</div></div>`:'Tous les rappels du jour sont passés.');
  const groups={Matin:schedule.filter(x=>mins(x.time)<720),Journée:schedule.filter(x=>mins(x.time)>=720&&mins(x.time)<1200),Soir:schedule.filter(x=>mins(x.time)>=1200)};
  const sec=document.getElementById('sections'); sec.innerHTML='';
  Object.entries(groups).forEach(([name,items])=>{
    const done=items.filter(x=>today[x.id]).length;
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<h2 style="margin:0 0 8px">${name}</h2><div class="small">${done}/${items.length} faits</div>`;
    items.forEach(item=>{
      const checked=!!today[item.id];
      const div=document.createElement('div'); div.className='item'+(due.some(d=>d.id===item.id)?' due':'');
      div.innerHTML=`<input type="checkbox" ${checked?'checked':''}><div><b>${item.time} · ${item.label}</b> <span class="badge">${item.detail}</span><div class="small">${item.cat}</div></div><div>${checked?'✅':''}</div>`;
      div.querySelector('input').addEventListener('change',e=>{const all=checks();all[k(new Date())]=all[k(new Date())]||{};all[k(new Date())][item.id]=e.target.checked;setChecks(all);render();});
      card.appendChild(div);
    });
    sec.appendChild(card);
  });
  if(Notification && Notification.permission==='granted' && due.length){
    const sig=k(now)+'-'+due.map(x=>x.id).join(',');
    if(sig!==last){last=sig;new Notification('Traitement à faire',{body:due.map(x=>`${x.time} · ${x.label} (${x.detail})`).join('\n')});}
  }
}
document.getElementById('notif').onclick=async()=>{if(window.AndroidApp&&AndroidApp.enableNativeReminders){AndroidApp.enableNativeReminders();alert('Alarmes Android activées. Pense à autoriser les notifications et à accepter le mode batterie non restreint si Android le propose.');}else if('Notification'in window){await Notification.requestPermission();render();}};
document.getElementById('azyter').onchange=e=>{settings.azyter=e.target.checked;localStorage.setItem('eye-settings',JSON.stringify(settings));if(window.AndroidApp&&AndroidApp.setAzyterMode){AndroidApp.setAzyterMode(e.target.checked);}render();};
document.getElementById('reset').onclick=()=>{const all=checks();all[k(new Date())]={};setChecks(all);render();};
setInterval(render,15000); render();
</script>
</body>
</html>
